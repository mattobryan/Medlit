<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedLit — Clinical Literature Search</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --bd: #e2e8f0;
      --bd2: #f1f5f9;
      --t1: #0f172a;
      --t2: #475569;
      --t3: #94a3b8;
      --blue: #2563eb;
      --blue-l: #eff6ff;
      --blue-b: #bfdbfe;
      --teal: #0d9488;
      --teal-l: #f0fdfa;
      --teal-b: #99f6e4;
      --green: #16a34a;
      --green-l: #f0fdf4;
      --amber: #d97706;
      --amber-l: #fffbeb;
      --purple: #7c3aed;
      --purple-l: #f5f3ff;
      --red-l: #fff1f2;
      --red: #f43f5e;
      --hdr: #0f172a;
      --r: 12px; --rs: 8px; --rxl: 16px;
      --sh: 0 1px 3px rgba(15,23,42,.08), 0 1px 2px rgba(15,23,42,.04);
      --sh2: 0 4px 16px rgba(15,23,42,.1);
      --sh3: 0 12px 40px rgba(15,23,42,.15);
      --ff: 'Inter', system-ui, sans-serif;
      --fd: 'Lora', Georgia, serif;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); font-family: var(--ff); color: var(--t1); }
    #root { min-height: 100vh; }

    /* ── HEADER ── */
    .hdr { background: var(--hdr); padding: 0 24px; height: 52px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
    .hdr-inner { max-width: 780px; margin: 0 auto; width: 100%; display: flex; align-items: center; gap: 12px; }
    .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo-mark { width: 28px; height: 28px; background: linear-gradient(135deg, var(--teal), var(--blue)); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .logo-name { font-family: var(--fd); font-size: 16px; font-weight: 600; color: #fff; letter-spacing: -.01em; }
    .hdr-gap { flex: 1; }
    .hdr-btns { display: flex; align-items: center; gap: 6px; }
    .hbtn { height: 30px; padding: 0 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,.15); background: transparent; color: rgba(255,255,255,.65); font-family: var(--ff); font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all .15s; white-space: nowrap; }
    .hbtn:hover { background: rgba(255,255,255,.1); color: #fff; }
    .hbtn.on { background: var(--teal); border-color: var(--teal); color: #fff; }
    .hbtn-icon { width: 30px; padding: 0; justify-content: center; font-size: 14px; }

    /* ── SEARCH HERO ── */
    .hero { background: #fff; border-bottom: 1px solid var(--bd); padding: 28px 24px 20px; }
    .hero-inner { max-width: 780px; margin: 0 auto; }
    .search-wrap { display: flex; gap: 8px; align-items: center; }
    .search-box { flex: 1; position: relative; }
    .search-ico { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--t3); pointer-events: none; font-size: 16px; }
    .search-inp { width: 100%; height: 48px; padding: 0 16px 0 44px; border: 2px solid var(--bd); border-radius: var(--r); font-family: var(--ff); font-size: 15px; color: var(--t1); background: var(--bg); outline: none; transition: all .15s; }
    .search-inp:focus { border-color: var(--teal); background: #fff; box-shadow: 0 0 0 3px rgba(13,148,136,.12); }
    .search-inp::placeholder { color: var(--t3); }
    .search-btn { height: 48px; padding: 0 24px; background: var(--teal); color: #fff; border: none; border-radius: var(--r); font-family: var(--ff); font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all .15s; white-space: nowrap; box-shadow: 0 2px 8px rgba(13,148,136,.3); flex-shrink: 0; }
    .search-btn:hover { background: #0b7a70; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(13,148,136,.4); }
    .search-btn:active { transform: none; }
    .search-btn:disabled { background: var(--t3); box-shadow: none; cursor: not-allowed; transform: none; }
    .search-sub { display: flex; align-items: center; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .mode-pill { height: 26px; padding: 0 12px; border-radius: 20px; border: 1.5px solid var(--bd); background: #fff; color: var(--t2); font-family: var(--ff); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
    .mode-pill.active { background: var(--t1); border-color: var(--t1); color: #fff; }
    .mode-pill:not(.active):hover { border-color: var(--t2); color: var(--t1); }
    .sub-sep { color: var(--bd); font-size: 14px; }
    .smart-pill { height: 26px; padding: 0 12px; border-radius: 20px; border: 1.5px solid var(--bd); background: #fff; color: var(--t2); font-family: var(--ff); font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all .15s; }
    .smart-pill.active { background: var(--amber-l); border-color: var(--amber); color: var(--amber); }
    .smart-pill:not(.active):hover { border-color: var(--t2); color: var(--t1); }
    .eq-pill { height: 26px; padding: 0 12px; border-radius: 20px; border: 1.5px solid var(--bd); background: #fff; color: var(--t3); font-family: var(--ff); font-size: 12px; cursor: pointer; transition: all .15s; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .eq-pill:hover { border-color: var(--t3); color: var(--t2); }

    /* PICO */
    .pico-wrap { margin-top: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .pf { display: flex; flex-direction: column; gap: 4px; }
    .pf-label { font-size: 11px; font-weight: 700; color: var(--t2); text-transform: uppercase; letter-spacing: .06em; display: flex; align-items: center; gap: 5px; }
    .pf-dot { width: 18px; height: 18px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #fff; flex-shrink: 0; }
    .pd-p { background: var(--blue); } .pd-i { background: var(--teal); } .pd-c { background: var(--amber); } .pd-o { background: var(--purple); }
    .pf-inp { height: 36px; padding: 0 12px; border: 1.5px solid var(--bd); border-radius: var(--rs); font-family: var(--ff); font-size: 13px; color: var(--t1); background: var(--bg); outline: none; transition: border-color .15s; }
    .pf-inp:focus { border-color: var(--teal); background: #fff; }
    .pf-inp::placeholder { color: var(--t3); }
    .pico-preview { margin-top: 8px; padding: 8px 12px; background: var(--blue-l); border: 1px solid var(--blue-b); border-radius: var(--rs); font-size: 12px; color: var(--blue); font-family: monospace; word-break: break-all; line-height: 1.6; }

    /* Enhanced query */
    .eq-banner { margin-top: 8px; padding: 7px 12px; background: var(--amber-l); border: 1px solid #fde68a; border-radius: var(--rs); font-size: 12px; color: var(--amber); display: flex; align-items: flex-start; gap: 6px; }
    .eq-banner b { white-space: nowrap; }

    /* ── SETTINGS MODAL ── */
    .modal-bg { position: fixed; inset: 0; background: rgba(15,23,42,.4); z-index: 200; display: flex; align-items: flex-start; justify-content: flex-end; padding: 60px 24px 0 0; }
    .modal { background: #fff; border-radius: var(--rxl); padding: 24px; width: 380px; box-shadow: var(--sh3); animation: popIn .15s ease both; }
    @keyframes popIn { from { opacity:0; transform: translateY(-8px) scale(.97); } to { opacity:1; transform: none; } }
    .modal-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-title { font-size: 15px; font-weight: 700; color: var(--t1); }
    .modal-close { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--t3); line-height: 1; padding: 2px; }
    .modal-close:hover { color: var(--t1); }
    .mf { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .mf-label { font-size: 11px; font-weight: 700; color: var(--t2); text-transform: uppercase; letter-spacing: .06em; }
    .mf-input { height: 38px; padding: 0 12px; border: 1.5px solid var(--bd); border-radius: var(--rs); font-family: var(--ff); font-size: 13px; color: var(--t1); outline: none; transition: border-color .15s; }
    .mf-input:focus { border-color: var(--teal); }
    .mf-hint { font-size: 11px; color: var(--t3); line-height: 1.5; }
    .mf-status { font-size: 11px; font-weight: 600; color: var(--teal); display: flex; align-items: center; gap: 4px; margin-top: 3px; }
    .modal-save { width: 100%; height: 40px; background: var(--teal); color: #fff; border: none; border-radius: var(--rs); font-family: var(--ff); font-size: 14px; font-weight: 700; cursor: pointer; transition: background .15s; margin-top: 4px; }
    .modal-save:hover { background: #0b7a70; }

    /* ── MAIN ── */
    .main { max-width: 780px; margin: 0 auto; padding: 20px 24px 80px; }

    /* Source tabs */
    .tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px; }
    .tab { height: 30px; padding: 0 12px; border-radius: 20px; border: 1.5px solid var(--bd); background: #fff; color: var(--t2); font-family: var(--ff); font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all .15s; }
    .tab:hover { border-color: var(--t2); color: var(--t1); }
    .tab.active { background: var(--t1); border-color: var(--t1); color: #fff; }
    .tab-n { font-size: 11px; opacity: .7; }

    /* Paywall strip */
    .pw-strip { margin-bottom: 16px; padding: 12px 16px; background: #fff; border: 1px solid var(--bd); border-radius: var(--r); }
    .pw-strip-hd { font-size: 11px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .pw-dbs { display: flex; flex-wrap: wrap; gap: 6px; }
    .pw-btn { height: 28px; padding: 0 11px; border-radius: 20px; border: 1.5px solid; font-family: var(--ff); font-size: 12px; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; transition: opacity .15s; }
    .pw-btn:hover { opacity: .75; }
    .pw-note { font-size: 11px; color: var(--t3); margin-top: 6px; }

    /* Spinner */
    .spin { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: rot .7s linear infinite; flex-shrink: 0; }
    .mspin { width: 12px; height: 12px; border: 2px solid var(--bd); border-top-color: var(--teal); border-radius: 50%; animation: rot .7s linear infinite; flex-shrink: 0; }
    @keyframes rot { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    @keyframes cardIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }

    /* Loading list */
    .ld-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .ld-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #fff; border: 1px solid var(--bd); border-radius: var(--rs); font-size: 13px; color: var(--t2); }
    .ld-done { width: 14px; height: 14px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 9px; flex-shrink: 0; }
    .err-row { padding: 8px 12px; background: var(--red-l); border: 1px solid #fecdd3; border-radius: var(--rs); font-size: 12px; color: var(--red); margin-bottom: 6px; }

    /* AI Panel */
    .ai-panel { background: var(--purple-l); border: 1px solid #ddd6fe; border-left: 4px solid var(--purple); border-radius: var(--r); padding: 18px 20px; margin-bottom: 16px; animation: fadeUp .3s ease both; }
    .ai-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .ai-badge { display: flex; align-items: center; gap: 5px; background: var(--purple); color: #fff; border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
    .ai-dot { width: 6px; height: 6px; background: #fff; border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }
    .ai-ev { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: .04em; }
    .ev-high { background: var(--green-l); color: var(--green); }
    .ev-moderate { background: var(--amber-l); color: var(--amber); }
    .ev-low { background: var(--red-l); color: var(--red); }
    .ev-mixed { background: var(--blue-l); color: var(--blue); }
    .ai-dismiss { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--t3); font-size: 16px; line-height: 1; }
    .ai-dismiss:hover { color: var(--t1); }
    .ai-overview { font-family: var(--fd); font-size: 14px; font-style: italic; color: var(--t1); line-height: 1.85; margin-bottom: 12px; }
    .ai-slbl { font-size: 10px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
    .ai-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
    .ai-tag { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: #fff; border: 1px solid #ddd6fe; color: var(--purple); font-weight: 500; }
    .ai-types { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
    .ai-chip { font-size: 11px; padding: 2px 9px; border-radius: 20px; background: #fff; border: 1px solid var(--bd); color: var(--t2); }
    .ai-box { padding: 10px 14px; border-radius: var(--rs); margin-bottom: 10px; }
    .ai-box-green { background: var(--green-l); border-left: 3px solid var(--green); }
    .ai-box-teal { background: var(--teal-l); border-left: 3px solid var(--teal); }
    .ai-box-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 4px; }
    .ai-box-green .ai-box-lbl { color: var(--green); }
    .ai-box-teal .ai-box-lbl { color: var(--teal); }
    .ai-box-txt { font-size: 13px; color: var(--t1); line-height: 1.65; }
    .ai-sug-wrap { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .ai-sug { font-size: 12px; padding: 4px 11px; border-radius: 20px; border: 1.5px solid var(--teal-b); background: var(--teal-l); color: var(--teal); cursor: pointer; font-weight: 600; font-family: var(--ff); transition: all .15s; }
    .ai-sug:hover { background: var(--teal); color: #fff; border-color: var(--teal); }
    .ai-loading { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--t2); }
    .ai-nokey { font-size: 13px; color: var(--t2); line-height: 1.6; }

    /* Study badges */
    .stbadge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: .04em; flex-shrink: 0; }
    .st-sr { background: #f3e8ff; color: #7e22ce; }
    .st-rct { background: #dcfce7; color: #15803d; }
    .st-cohort { background: #fef3c7; color: #92400e; }
    .st-qual { background: #fce7f3; color: #9d174d; }
    .st-cross { background: #dbeafe; color: #1d4ed8; }
    .st-review { background: #ccfbf1; color: #0f766e; }
    .st-case { background: #fef9c3; color: #854d0e; }

    /* Toolbar */
    .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .res-count { font-size: 13px; color: var(--t2); font-weight: 500; }
    .tbr { display: flex; align-items: center; gap: 6px; }
    .sortsel { height: 30px; padding: 0 10px; border: 1.5px solid var(--bd); border-radius: var(--rs); font-family: var(--ff); font-size: 12px; color: var(--t2); background: #fff; outline: none; cursor: pointer; }
    .expwrap { position: relative; }
    .expbtn { height: 30px; padding: 0 12px; border: 1.5px solid var(--bd); border-radius: var(--rs); font-family: var(--ff); font-size: 12px; color: var(--t2); background: #fff; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all .15s; font-weight: 500; }
    .expbtn:hover { border-color: var(--t2); color: var(--t1); }
    .expmenu { position: absolute; right: 0; top: calc(100% + 4px); background: #fff; border: 1.5px solid var(--bd); border-radius: var(--rs); box-shadow: var(--sh2); z-index: 200; min-width: 170px; overflow: hidden; animation: fadeUp .12s ease both; }
    .expitem { display: block; width: 100%; padding: 9px 14px; font-size: 13px; color: var(--t1); background: none; border: none; text-align: left; cursor: pointer; font-family: var(--ff); transition: background .1s; }
    .expitem:hover { background: var(--bg); }
    .expitem + .expitem { border-top: 1px solid var(--bd2); }

    /* Result cards */
    .rcard { background: #fff; border: 1px solid var(--bd); border-radius: var(--r); padding: 18px 20px; margin-bottom: 8px; animation: cardIn .2s ease both; transition: box-shadow .15s, border-color .15s; }
    .rcard:hover { box-shadow: var(--sh); border-color: #cbd5e1; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 6px; }
    .ctitle { font-family: var(--fd); font-size: 15px; font-weight: 600; color: var(--t1); line-height: 1.5; flex: 1; }
    .ctitle a { color: inherit; text-decoration: none; }
    .ctitle a:hover { color: var(--teal); }
    .cbadges { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
    .srcbadge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
    .b-pubmed { background: #dbeafe; color: #1d4ed8; }
    .b-europepmc { background: #dcfce7; color: #15803d; }
    .b-semanticscholar { background: #fef3c7; color: #92400e; }
    .b-openalex { background: #f3e8ff; color: #7e22ce; }
    .b-crossref { background: #fce7f3; color: #9d174d; }
    .b-doaj { background: #ccfbf1; color: #0f766e; }
    .cmeta { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--t3); margin-bottom: 10px; flex-wrap: wrap; }
    .myr { font-weight: 600; color: var(--t2); }
    .msep { color: var(--bd); }
    .mjnl { font-style: italic; }
    .mcite { font-size: 11px; }
    .cabstract { font-size: 13px; color: var(--t2); line-height: 1.75; padding: 10px 14px; background: var(--bg); border-radius: var(--rs); margin-bottom: 4px; }
    .abs-more { background: none; border: none; cursor: pointer; font-size: 11px; color: var(--teal); font-family: var(--ff); font-weight: 600; padding: 2px 0; display: block; margin-bottom: 8px; }
    .cfooter { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding-top: 10px; border-top: 1px solid var(--bd2); }
    .lbtn { display: inline-flex; align-items: center; gap: 4px; height: 30px; padding: 0 12px; border-radius: var(--rs); font-size: 12px; font-weight: 600; text-decoration: none; border: 1.5px solid transparent; cursor: pointer; font-family: var(--ff); transition: all .15s; white-space: nowrap; }
    .lb-pri { background: var(--t1); color: #fff; border-color: var(--t1); }
    .lb-pri:hover { background: #1e293b; }
    .lb-grn { background: var(--green-l); color: var(--green); border-color: #86efac; }
    .lb-grn:hover { background: #dcfce7; }
    .lb-amb { background: var(--amber-l); color: var(--amber); border-color: #fde68a; }
    .lb-amb:hover { background: #fef3c7; }
    .lb-gray { background: var(--bg); color: var(--t3); border-color: var(--bd); cursor: default; }
    .oa-flag { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; background: var(--green-l); color: var(--green); border: 1px solid #86efac; text-transform: uppercase; }
    .proxy-flag { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; background: var(--blue-l); color: var(--blue); border: 1px solid var(--blue-b); text-transform: uppercase; }
    .bkbtn { background: none; border: none; cursor: pointer; font-size: 14px; line-height: 1; padding: 3px; opacity: .3; transition: opacity .15s; margin-left: auto; }
    .bkbtn:hover { opacity: .7; }
    .bkbtn.saved { opacity: 1; }

    /* Bookmark bar */
    .bk-bar { padding: 8px 14px; background: var(--amber-l); border: 1px solid #fde68a; border-radius: var(--rs); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--amber); font-weight: 600; }
    .bk-view { background: none; border: none; cursor: pointer; font-size: 12px; color: var(--blue); font-family: var(--ff); font-weight: 600; text-decoration: underline; }
    .bk-clr { background: none; border: none; cursor: pointer; font-size: 12px; color: var(--t3); font-family: var(--ff); margin-left: auto; }

    /* Empty state */
    .empty { text-align: center; padding: 60px 20px; }
    .empty-ico { font-size: 48px; margin-bottom: 16px; }

    /* Filters */
    .filters-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .filt-btn { height: 26px; padding: 0 10px; border-radius: 20px; border: 1.5px solid var(--bd); background: #fff; color: var(--t3); font-size: 11px; font-weight: 500; cursor: pointer; font-family: var(--ff); transition: all .15s; }
    .filt-btn:hover { border-color: var(--t2); color: var(--t2); }

    /* Toast */

    @media (max-width: 600px) {

  </style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef, useEffect } = React;

// ── Utils ──────────────────────────────────────────────────────────────────────
const clean = (s="") => s.replace(/<[^>]*>/g,"").replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"').replace(/&#39;/g,"'").trim();
const trunc = (s, n=1500) => s ? (s.trim().length>n ? s.trim().slice(0,n)+"…" : s.trim()) : null;
const truncD = (s, n=280) => s && s.length>n ? s.slice(0,n)+"…" : s;

function rebuildAbstract(inv) {
  if(!inv||typeof inv!=="object") return null;
  try {
    const all=Object.values(inv).flat(); if(!all.length) return null;
    const max=Math.max(...all)+1, arr=new Array(max).fill("");
    for(const [w,ps] of Object.entries(inv)) for(const p of ps) if(p<max) arr[p]=w;
    return arr.join(" ").trim()||null;
  } catch { return null; }
}

function dedup(all) {
  const seen=new Set();
  return all.filter(r=>{ const k=r.doi?r.doi.toLowerCase():r.title.toLowerCase().slice(0,60); if(seen.has(k)) return false; seen.add(k); return true; });
}

function studyType(title="", abs="") {
  const t=(title+" "+(abs||"")).toLowerCase();
  if(/systematic review|meta.analysis/.test(t)) return "Systematic Review";
  if(/\brct\b|randomis|randomiz|placebo.controlled|double.blind/.test(t)) return "RCT";
  if(/cohort study|prospective study|retrospective|longitudinal/.test(t)) return "Cohort";
  if(/qualitative|thematic analysis|phenomenolog|focus group/.test(t)) return "Qualitative";
  if(/\bsurvey\b|questionnaire|cross.sectional/.test(t)) return "Cross-Sectional";
  if(/scoping review|narrative review|integrative review/.test(t)) return "Review";
  if(/case report|case series/.test(t)) return "Case Report";
  return null;
}

function picoQ(p,i,c,o) { return [p,i,c,o].filter(s=>s&&s.trim()).map(s=>`(${s.trim()})`).join(" AND "); }

function scoreR(r, q) {
  const words=q.toLowerCase().split(/\s+/).filter(w=>w.length>3);
  const ti=(r.title||"").toLowerCase(), ab=(r.abstract||"").toLowerCase();
  let s=0; words.forEach(w=>{ if(ti.includes(w)) s+=3; if(ab.includes(w)) s+=1; });
  if(r.isOA||r.pdfUrl) s+=2;
  if((r.citationCount||0)>100) s+=3; else if((r.citationCount||0)>10) s+=1;
  const yr=parseInt(r.year)||0; if(yr>=2020) s+=2; else if(yr>=2015) s+=1;
  return s;
}

function dlFile(content, name, type) {
  const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(new Blob([content],{type})),download:name});
  a.click(); URL.revokeObjectURL(a.href);
}

const toBibTeX = rs => rs.map((r,i)=>{
  const doi=r.doi?r.doi.replace("https://doi.org/",""):"";
  return `@article{ref${i+1}_${r.year||"nd"},\n  title   = {${r.title}},\n  author  = {${(r.authors||"Unknown").replace(/ et al\.?/," and others")}},\n  year    = {${r.year||"n.d."}},\n  journal = {${r.journal||""}},${doi?`\n  doi     = {${doi}},`:""}\n  url     = {${r.link||r.doi||""}}\n}`;
}).join("\n\n");

const toRIS = rs => rs.map(r=>{
  const doi=r.doi?r.doi.replace("https://doi.org/",""):"";
  const L=["TY  - JOUR",`TI  - ${r.title}`];
  (r.authors||"").split(",").forEach(a=>L.push(`AU  - ${a.trim()}`));
  if(r.year) L.push(`PY  - ${r.year}`); if(r.journal) L.push(`JO  - ${r.journal}`);
  if(doi) L.push(`DO  - ${doi}`); if(r.link||r.doi) L.push(`UR  - ${r.link||r.doi}`);
  if(r.abstract) L.push(`AB  - ${r.abstract.slice(0,500)}`); L.push("ER  - "); return L.join("\n");
}).join("\n\n");

const toCSV = rs => { const e=s=>`"${(s||"").replace(/"/g,'""')}`; return ["Title,Authors,Year,Journal,DOI,Source,OA,Study Type",...rs.map(r=>[e(r.title),e(r.authors),r.year||"",e(r.journal),r.doi||r.link||"",r.source||"",r.isOA?"Yes":"No",r.studyType||""].join(","))].join("\n"); };

// ── APIs ───────────────────────────────────────────────────────────────────────
async function searchPubMed(q) {
  const sd=await(await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(q)}&retmax=15&retmode=json&sort=relevance`)).json();
  const ids=sd.esearchresult?.idlist||[]; if(!ids.length) return [];
  const xml=await(await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi?db=pubmed&id=${ids.join(",")}&rettype=xml&retmode=xml`)).text();
  const doc=new DOMParser().parseFromString(xml,"text/xml");
  return Array.from(doc.querySelectorAll("PubmedArticle")).map(a=>{
    const pmid=a.querySelector("PMID")?.textContent;
    const title=clean(a.querySelector("ArticleTitle")?.textContent||"Untitled");
    const abParts=Array.from(a.querySelectorAll("AbstractText")).map(t=>{const l=t.getAttribute("Label");return l?`${l}: ${t.textContent}`:t.textContent;});
    const authEls=Array.from(a.querySelectorAll("Author"));
    const doi=a.querySelector('ArticleId[IdType="doi"]')?.textContent||null;
    const abstract=trunc(abParts.join(" ")||null);
    return {id:`pm-${pmid}`,source:"pubmed",title,abstract,studyType:studyType(title,abstract||""),authors:authEls.slice(0,4).map(el=>`${el.querySelector("LastName")?.textContent||""} ${el.querySelector("Initials")?.textContent||""}`.trim()).join(", ")+(authEls.length>4?" et al.":""),year:a.querySelector("PubDate Year")?.textContent||a.querySelector("PubDate MedlineDate")?.textContent?.slice(0,4)||"n.d.",journal:a.querySelector("Journal Title")?.textContent||a.querySelector("MedlineTA")?.textContent||"",doi:doi?`https://doi.org/${doi}`:null,link:`https://pubmed.ncbi.nlm.nih.gov/${pmid}/`,pdfUrl:null,isOA:false,oaChecked:false,citationCount:null};
  });
}

async function searchEuropePMC(q) {
  const d=await(await fetch(`https://www.ebi.ac.uk/europepmc/webservices/rest/search?query=${encodeURIComponent(q)}&format=json&pageSize=15&resultType=core&sort=relevance`)).json();
  return (d.resultList?.result||[]).map(p=>{const abstract=trunc(p.abstractText||null);return{id:`epmc-${p.id}`,source:"europepmc",title:clean(p.title||"Untitled"),abstract,studyType:studyType(p.title||"",abstract||""),authors:(p.authorString?.length>90?p.authorString.slice(0,90)+"…":p.authorString)||"Unknown",year:String(p.pubYear||"n.d."),journal:p.journalTitle||"",doi:p.doi?`https://doi.org/${p.doi}`:null,link:p.doi?`https://doi.org/${p.doi}`:`https://europepmc.org/article/${p.source}/${p.id}`,pdfUrl:p.fullTextUrlList?.fullTextUrl?.find(u=>u.documentStyle==="pdf")?.url||null,isOA:!!p.isOpenAccess,oaChecked:true,citationCount:p.citedByCount||null};});
}

async function searchSemanticScholar(q) {
  const d=await(await fetch(`https://api.semanticscholar.org/graph/v1/paper/search?query=${encodeURIComponent(q)}&limit=15&fields=title,authors,year,venue,externalIds,openAccessPdf,abstract,citationCount`)).json();
  return (d.data||[]).map(p=>{const abstract=trunc(p.abstract||null);return{id:`ss-${p.paperId}`,source:"semanticscholar",title:clean(p.title||"Untitled"),abstract,studyType:studyType(p.title||"",abstract||""),authors:(p.authors?.slice(0,4).map(a=>a.name).join(", ")||"Unknown")+(p.authors?.length>4?" et al.":""),year:p.year?String(p.year):"n.d.",journal:p.venue||"",doi:p.externalIds?.DOI?`https://doi.org/${p.externalIds.DOI}`:null,link:`https://www.semanticscholar.org/paper/${p.paperId}`,pdfUrl:p.openAccessPdf?.url||null,isOA:!!p.openAccessPdf?.url,oaChecked:true,citationCount:p.citationCount??null};});
}

async function searchOpenAlex(q) {
  const d=await(await fetch(`https://api.openalex.org/works?search=${encodeURIComponent(q)}&per-page=15&sort=relevance_score&mailto=medlitsearch@user.tool`)).json();
  return (d.results||[]).map(p=>{const abstract=trunc(rebuildAbstract(p.abstract_inverted_index));return{id:`oa-${p.id}`,source:"openalex",title:clean(p.title||"Untitled"),abstract,studyType:studyType(p.title||"",abstract||""),authors:(p.authorships?.slice(0,4).map(a=>a.author?.display_name).filter(Boolean).join(", ")||"Unknown")+(p.authorships?.length>4?" et al.":""),year:p.publication_year?String(p.publication_year):"n.d.",journal:p.primary_location?.source?.display_name||"",doi:p.doi||null,link:p.doi||p.id,pdfUrl:p.open_access?.oa_url||null,isOA:!!p.open_access?.is_oa,oaChecked:true,citationCount:p.cited_by_count??null};});
}

async function searchCrossRef(q) {
  const d=await(await fetch(`https://api.crossref.org/works?query.bibliographic=${encodeURIComponent(q)}&rows=12&select=DOI,title,author,published,container-title,abstract&mailto=medlitsearch@user.tool`)).json();
  return (d.message?.items||[]).map(p=>{const doi=p.DOI,yr=p.published?.["date-parts"]?.[0]?.[0];const title=clean(Array.isArray(p.title)?p.title[0]:(p.title||"Untitled"));const abstract=trunc(p.abstract?clean(p.abstract):null);return{id:`cr-${doi}`,source:"crossref",title,abstract,studyType:studyType(title,abstract||""),authors:(p.author?.slice(0,4).map(a=>`${a.family||""} ${(a.given||"").slice(0,1)}`.trim()).join(", ")||"Unknown")+(p.author?.length>4?" et al.":""),year:yr?String(yr):"n.d.",journal:Array.isArray(p["container-title"])?p["container-title"][0]:(p["container-title"]||""),doi:`https://doi.org/${doi}`,link:`https://doi.org/${doi}`,pdfUrl:null,isOA:false,oaChecked:false,citationCount:null};});
}

async function searchDOAJ(q) {
  const d=await(await fetch(`https://doaj.org/api/search/articles/${encodeURIComponent(q)}?page=1&pageSize=12`)).json();
  return (d.results||[]).map(r=>{const bib=r.bibjson||{},doiId=bib.identifier?.find(i=>i.type==="doi")?.id,ft=bib.link?.find(l=>l.type==="fulltext")?.url;const title=clean(bib.title||"Untitled");const abstract=trunc(bib.abstract||null);return{id:`doaj-${r.id}`,source:"doaj",title,abstract,studyType:studyType(title,abstract||""),authors:(bib.author?.slice(0,4).map(a=>a.name).filter(Boolean).join(", ")||"Unknown")+(bib.author?.length>4?" et al.":""),year:String(bib.year||"n.d."),journal:bib.journal?.title||"",doi:doiId?`https://doi.org/${doiId}`:null,link:ft||(doiId?`https://doi.org/${doiId}`:`https://doaj.org/article/${r.id}`),pdfUrl:ft||null,isOA:true,oaChecked:true,citationCount:null};});
}

async function checkUnpaywall(doi) {
  if(!doi) return null;
  const d=await(await fetch(`https://api.unpaywall.org/v2/${encodeURIComponent(doi.replace("https://doi.org/",""))}?email=medlitsearch@user.tool`)).json();
  if(d.is_oa){const loc=d.best_oa_location;return{isOA:true,pdfUrl:loc?.url_for_pdf||loc?.url||null};}
  return{isOA:false,pdfUrl:null};
}

async function enhanceQuery(q, key) {
  const d=await(await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-opus-4-7",max_tokens:150,system:"Medical research librarian. Convert the user's topic into an optimised boolean search string using synonyms and MeSH-style terms. Max 120 chars. Return ONLY the string.",messages:[{role:"user",content:q}]})})).json();
  if(d.error) throw new Error(d.error.message);
  return d.content?.[0]?.text?.trim()||q;
}

async function synthesise(papers, q, key) {
  const list=papers.slice(0,20).map((p,i)=>`${i+1}. "${p.title}" (${p.year})${p.journal?` — ${p.journal}`:""}${p.studyType?` [${p.studyType}]`:""}${p.abstract?`\n${p.abstract.slice(0,280)}`:""}`).join("\n\n");
  const d=await(await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-opus-4-7",max_tokens:1400,system:"Senior medical research librarian. Return ONLY valid JSON, no markdown.",messages:[{role:"user",content:`Query: "${q}"\n\nPapers:\n${list}\n\nReturn: {"overview":"3-4 sentence synthesis","themes":["t1","t2","t3","t4"],"study_types":["list unique types"],"evidence_level":"HIGH or MODERATE or LOW or MIXED","clinical_implications":"1-2 sentences","gaps":"1-2 sentences","suggested_terms":["3-4 related searches"]}`}]})})).json();
  if(d.error) throw new Error(d.error.message);
  return JSON.parse((d.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim());
}

// ── Static ─────────────────────────────────────────────────────────────────────
const SRC_META={pubmed:{label:"PubMed",badge:"b-pubmed"},europepmc:{label:"Europe PMC",badge:"b-europepmc"},semanticscholar:{label:"Sem. Scholar",badge:"b-semanticscholar"},openalex:{label:"OpenAlex",badge:"b-openalex"},crossref:{label:"CrossRef",badge:"b-crossref"},doaj:{label:"DOAJ",badge:"b-doaj"}};
const ST_CSS={"Systematic Review":"st-sr","RCT":"st-rct","Cohort":"st-cohort","Qualitative":"st-qual","Cross-Sectional":"st-cross","Review":"st-review","Case Report":"st-case"};

const PAYWALL_DBS=[
  {name:"CINAHL",     color:"#1d4ed8",bg:"#dbeafe",getUrl:q=>`https://search.ebscohost.com/login.aspx?direct=true&db=cin20&bquery=${encodeURIComponent(q)}&type=1&site=ehost-live`},
  {name:"Scopus",     color:"#92400e",bg:"#fef3c7",getUrl:q=>`https://www.scopus.com/search/form.uri?display=basic&query=${encodeURIComponent(q)}`},
  {name:"Cochrane",   color:"#1e40af",bg:"#eff6ff",getUrl:q=>`https://www.cochranelibrary.com/search?searchBy=6&searchText=${encodeURIComponent(q)}`},
  {name:"Web of Sci", color:"#991b1b",bg:"#fef2f2",getUrl:q=>`https://www.webofscience.com/wos/woscc/basic-search?query=${encodeURIComponent(q)}&field=ALL`},
  {name:"PsycINFO",   color:"#9a3412",bg:"#fff7ed",getUrl:q=>`https://search.ebscohost.com/login.aspx?direct=true&db=psyh&bquery=${encodeURIComponent(q)}&type=1&site=ehost-live`},
  {name:"AMED",       color:"#065f46",bg:"#ecfdf5",getUrl:q=>`https://search.ebscohost.com/login.aspx?direct=true&db=amed&bquery=${encodeURIComponent(q)}&type=1&site=ehost-live`},
  {name:"ProQuest",   color:"#1e3a8a",bg:"#eff6ff",getUrl:q=>`https://search.proquest.com/search?query=${encodeURIComponent(q)}&searchtype=basic`},
  {name:"MIDIRS",     color:"#6b21a8",bg:"#f5f3ff",getUrl:q=>`https://www.midirs.org/evidence/maternity-and-infant-care/search/?query=${encodeURIComponent(q)}`},
];

const WORKAROUNDS=[
  {icon:"🔓",name:"Unpaywall",type:"legal",desc:"Finds legal free versions via preprints and author manuscripts. Already integrated into this tool.",url:"https://unpaywall.org",ul:"Browser extension"},
  {icon:"🟢",name:"Open Access Button",type:"legal",desc:"Locates legal preprint versions and can request copies from authors.",url:"https://openaccessbutton.org",ul:"oabutton.org"},
  {icon:"🏛️",name:"PubMed Central",type:"free",desc:"All NIH-funded research is freely deposited here — often identical to the paywalled version.",url:"https://www.ncbi.nlm.nih.gov/pmc/",ul:"Search PMC"},
  {icon:"📄",name:"medRxiv",type:"free",desc:"Preprint server for health sciences — freely available before publication.",url:"https://www.medrxiv.org",ul:"Browse"},
  {icon:"📧",name:"Email the Author",type:"tip",desc:"Authors almost always share their own work. Find them on ResearchGate.",url:"https://www.researchgate.net",ul:"ResearchGate"},
  {icon:"🏫",name:"Interlibrary Loan",type:"free",desc:"Request any paywalled paper free via your university or NHS library — 24–48 hours.",url:"https://www.bl.uk/services/document-supply",ul:"British Library ILL"},
];

const EXAMPLES=["postnatal depression maternal mental health","nurse-led sepsis recognition","hand hygiene ICU infection prevention","breastfeeding support interventions","pressure injury prevention elderly","opioid management palliative care"];

// ── Components ─────────────────────────────────────────────────────────────────
const SBadge=({type})=>{ const c=type&&ST_CSS[type]; return c?<span className={`stbadge ${c}`}>{type}</span>:null; };
const EvBadge=({level})=>{ if(!level) return null; const c={HIGH:"ev-high",MODERATE:"ev-moderate",LOW:"ev-low",MIXED:"ev-mixed"}[level.toUpperCase()]||"ev-mixed"; return <span className={`ai-ev ${c}`}>{level}</span>; };

// ── App ────────────────────────────────────────────────────────────────────────
function App() {
  const [kw, setKw] = useState("postnatal depression maternal mental health");
  const [mode, setMode] = useState("free");
  const [pico, setPico] = useState({p:"",i:"",c:"",o:""});
  const [smart, setSmart] = useState(false);
  const [eqUsed, setEqUsed] = useState(null);

  const [apiKey, setApiKey] = useState(()=>localStorage.getItem("ml-key")||"");
  const [showModal, setShowModal] = useState(false);
  const [mKey, setMKey] = useState(()=>localStorage.getItem("ml-key")||"");
  const [mInst, setMInst] = useState(()=>localStorage.getItem("ml-inst")||"");
  const [mProxy, setMProxy] = useState(()=>localStorage.getItem("ml-proxy")||"");
  const [inst, setInst] = useState(()=>localStorage.getItem("ml-inst")||"");
  const [proxy, setProxy] = useState(()=>localStorage.getItem("ml-proxy")||"");

  const [results, setResults] = useState({pubmed:[],europepmc:[],semanticscholar:[],openalex:[],crossref:[],doaj:[]});
  const [loading, setLoading] = useState({pubmed:false,europepmc:false,semanticscholar:false,openalex:false,crossref:false,doaj:false});
  const [errors, setErrors] = useState({});
  const [activeSrc, setActiveSrc] = useState("all");
  const [sortBy, setSortBy] = useState("smart");
  const [aiSum, setAiSum] = useState(null);
  const [aiLoad, setAiLoad] = useState(false);
  const [aiOff, setAiOff] = useState(false);
  const [oaStatus, setOaStatus] = useState({});
  const [searched, setSearched] = useState(false);
  const [toast, setToast] = useState(null);
  const [showExp, setShowExp] = useState(false);
  const [bookmarks, setBookmarks] = useState(new Set());
  const [showBk, setShowBk] = useState(false);
  const [expanded, setExpanded] = useState(new Set());
  const [yrFrom, setYrFrom] = useState("");
  const [yrTo, setYrTo] = useState("");
  const [oaOnly, setOaOnly] = useState(false);
  const [autoBatch, setAutoBatch] = useState(false);
  const [showFilt, setShowFilt] = useState(false);
  const [history, setHistory] = useState(()=>{try{return JSON.parse(sessionStorage.getItem("ml-hist")||"[]");}catch{return[];}});

  const toastRef=useRef(null), expRef=useRef(null);

  useEffect(()=>{ if(!showExp) return; const h=e=>{if(expRef.current&&!expRef.current.contains(e.target)) setShowExp(false);}; document.addEventListener("mousedown",h); return()=>document.removeEventListener("mousedown",h); },[showExp]);

  const showToast=msg=>{setToast(msg);if(toastRef.current) clearTimeout(toastRef.current);toastRef.current=setTimeout(()=>setToast(null),3000);};

  const saveModal=()=>{
    setApiKey(mKey);setInst(mInst);setProxy(mProxy);
    localStorage.setItem("ml-key",mKey);localStorage.setItem("ml-inst",mInst);localStorage.setItem("ml-proxy",mProxy);
    setShowModal(false);showToast("✓ Settings saved");
  };

  const proxify=url=>proxy&&url?`${proxy.replace(/\/$/,"")}${proxy.includes("?")?"":"/login?url="}${encodeURIComponent(url)}`:url;

  const eq=mode==="pico"?picoQ(pico.p,pico.i,pico.c,pico.o):kw;

  const runSearch=useCallback(async(override)=>{
    const raw=override!==undefined?override:eq;
    if(!raw.trim()) return;
    if(override!==undefined){setMode("free");setKw(override);}
    setSearched(true);setResults({pubmed:[],europepmc:[],semanticscholar:[],openalex:[],crossref:[],doaj:[]});
    setErrors({});setOaStatus({});setAiSum(null);setAiOff(false);setActiveSrc("all");setShowBk(false);setExpanded(new Set());setEqUsed(null);
    setHistory(prev=>{const n=[raw.trim(),...prev.filter(h=>h!==raw.trim())].slice(0,5);try{sessionStorage.setItem("ml-hist",JSON.stringify(n));}catch{}return n;});

    let q=raw;
    if(smart&&apiKey){try{q=await enhanceQuery(raw,apiKey);setEqUsed(q);}catch{}}

    const SRCS=[{key:"pubmed",fn:searchPubMed},{key:"europepmc",fn:searchEuropePMC},{key:"semanticscholar",fn:searchSemanticScholar},{key:"openalex",fn:searchOpenAlex},{key:"crossref",fn:searchCrossRef},{key:"doaj",fn:searchDOAJ}];
    let acc={pubmed:[],europepmc:[],semanticscholar:[],openalex:[],crossref:[],doaj:[]};
    const proms=SRCS.map(({key,fn})=>{
      setLoading(l=>({...l,[key]:true}));
      return fn(q.trim()).then(d=>{setResults(r=>({...r,[key]:d}));acc[key]=d;}).catch(e=>setErrors(e2=>({...e2,[key]:e.message}))).finally(()=>setLoading(l=>({...l,[key]:false})));
    });
    Promise.allSettled(proms).then(()=>{
      const all=dedup([...acc.pubmed,...acc.europepmc,...acc.semanticscholar,...acc.openalex,...acc.crossref,...acc.doaj]);
      if(all.length>=3&&apiKey){setAiLoad(true);synthesise(all,q.trim(),apiKey).then(s=>setAiSum(s)).catch(e=>showToast("AI: "+e.message)).finally(()=>setAiLoad(false));}
      if(autoBatch){const chk=all.filter(r=>r.doi&&!r.oaChecked);let d=0;chk.forEach(r=>{d+=350;setTimeout(()=>{setOaStatus(s=>({...s,[r.id]:{checking:true}}));checkUnpaywall(r.doi).then(res=>setOaStatus(s=>({...s,[r.id]:{...res,checking:false}}))).catch(()=>setOaStatus(s=>({...s,[r.id]:{isOA:false,pdfUrl:null,checking:false}})));},d);});if(chk.length) showToast(`Checking OA for ${chk.length} papers…`);}
    });
  },[eq,apiKey,smart,autoBatch]);

  const checkOA=async(doi,id)=>{if(!doi||oaStatus[id]) return;setOaStatus(s=>({...s,[id]:{checking:true}}));try{const r=await checkUnpaywall(doi);setOaStatus(s=>({...s,[id]:{...r,checking:false}}));if(r.isOA) showToast("✓ Free version found!");else showToast("No free version. Try emailing the author.");}catch{setOaStatus(s=>({...s,[id]:{isOA:false,pdfUrl:null,checking:false}}));}};

  const allR=dedup([...results.pubmed,...results.europepmc,...results.semanticscholar,...results.openalex,...results.crossref,...results.doaj]);
  let disp=activeSrc==="all"?allR:(results[activeSrc]||[]);
  if(oaOnly) disp=disp.filter(r=>r.isOA||oaStatus[r.id]?.isOA);
  if(yrFrom) disp=disp.filter(r=>parseInt(r.year)>=parseInt(yrFrom));
  if(yrTo) disp=disp.filter(r=>parseInt(r.year)<=parseInt(yrTo));
  if(showBk) disp=disp.filter(r=>bookmarks.has(r.id));
  const rawQ=eq||kw;
  const sorted=[...disp].sort((a,b)=>sortBy==="year"?(parseInt(b.year)||0)-(parseInt(a.year)||0):sortBy==="smart"?scoreR(b,rawQ)-scoreR(a,rawQ):0);
  const isLoading=Object.values(loading).some(Boolean);
  const filtCount=[yrFrom,yrTo,oaOnly,autoBatch].filter(Boolean).length;

  const doExport=type=>{setShowExp(false);if(!sorted.length){showToast("No results to export.");return;}if(type==="text"){navigator.clipboard.writeText(sorted.map(r=>`${r.title} (${r.year})${r.journal?` — ${r.journal}`:""}\n${r.doi||r.link}`).join("\n\n")).then(()=>showToast(`✓ ${sorted.length} references copied`));}else if(type==="bib") dlFile(toBibTeX(sorted),"medlit.bib","text/plain");else if(type==="ris") dlFile(toRIS(sorted),"medlit.ris","text/plain");else if(type==="csv") dlFile(toCSV(sorted),"medlit.csv","text/csv");};

  const TABS=[{key:"all",label:"All",count:allR.length},{key:"pubmed",label:"PubMed",count:results.pubmed.length},{key:"europepmc",label:"Europe PMC",count:results.europepmc.length},{key:"semanticscholar",label:"Semantic Scholar",count:results.semanticscholar.length},{key:"openalex",label:"OpenAlex",count:results.openalex.length},{key:"crossref",label:"CrossRef",count:results.crossref.length},{key:"doaj",label:"DOAJ",count:results.doaj.length}];

  return (
    <div>
      {/* Header */}
      <header className="hdr">
        <div className="hdr-inner">
          <div className="logo">
            <div className="logo-mark">⚕</div>
            <span className="logo-name">MedLit{inst?` · ${inst}`:""}</span>
          </div>
          <div className="hdr-gap"/>
          <div className="hdr-btns">
            <button className={`hbtn ${smart?"on":""}`} onClick={()=>setSmart(v=>!v)} title="AI-optimises your query before searching">
              ✦ Smart{smart?" ON":" OFF"}
            </button>
            <button className="hbtn hbtn-icon" onClick={()=>setShowModal(true)} title="Settings">⚙</button>
          </div>
        </div>
      </header>

      {/* Settings Modal */}
      {showModal && (
        <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget) setShowModal(false);}}>
          <div className="modal">
            <div className="modal-hd">
              <span className="modal-title">Settings</span>
              <button className="modal-close" onClick={()=>setShowModal(false)}>✕</button>
            </div>
            <div className="mf">
              <div className="mf-label">Anthropic API Key</div>
              <input className="mf-input" type="password" placeholder="sk-ant-…" value={mKey} onChange={e=>setMKey(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveModal()} />
              <div className="mf-hint">Enables AI synthesis and Smart Search. Saved to this device.</div>
              {apiKey && <div className="mf-status">✓ Active</div>}
            </div>
            <div className="mf">
              <div className="mf-label">Institution Name</div>
              <input className="mf-input" type="text" placeholder="e.g. University of Leeds" value={mInst} onChange={e=>setMInst(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveModal()} />
            </div>
            <div className="mf">
              <div className="mf-label">EZproxy URL</div>
              <input className="mf-input" type="text" placeholder="https://ezproxy.yourinstitution.ac.uk/login?url=" value={mProxy} onChange={e=>setMProxy(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveModal()} style={{width:"100%"}} />
              <div className="mf-hint">All paper links route through this automatically. Authenticate once per session at your institution's login page — nothing stored here except the URL.</div>
              {proxy && <div className="mf-status">✓ Proxy: {(proxy.split("/")[2]||"").slice(0,30)}</div>}
            </div>
            <button className="modal-save" onClick={saveModal}>Save</button>
          </div>
        </div>
      )}

      {/* Search hero */}
      <div className="hero">
        <div className="hero-inner">
          <div className="search-wrap">
            <div className="search-box">
              <span className="search-ico">🔍</span>
              {mode==="free"
                ? <input className="search-inp" value={kw} onChange={e=>setKw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&runSearch()} placeholder="Search the clinical literature…" />
                : <input className="search-inp" readOnly value={picoQ(pico.p,pico.i,pico.c,pico.o)||"Fill in the PICO fields below…"} style={{opacity:.7,cursor:"default"}} />}
            </div>
            <button className="search-btn" onClick={()=>runSearch()} disabled={isLoading||!eq.trim()}>
              {isLoading?<><div className="spin"/>Searching…</>:"Search"}
            </button>
          </div>

          <div className="search-sub">
            <button className={`mode-pill ${mode==="free"?"active":""}`} onClick={()=>setMode("free")}>Free text</button>
            <button className={`mode-pill ${mode==="pico"?"active":""}`} onClick={()=>setMode("pico")}>PICO</button>
            <span className="sub-sep">·</span>
            {history.map((h,i)=><button key={i} className="eq-pill" title={h} onClick={()=>runSearch(h)}>{h}</button>)}
          </div>

          {mode==="pico" && (
            <div className="pico-wrap">
              <div className="pf"><div className="pf-label"><span className="pf-dot pd-p">P</span>Population</div><input className="pf-inp" placeholder="e.g. postmenopausal women" value={pico.p} onChange={e=>setPico(v=>({...v,p:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&runSearch()} /></div>
              <div className="pf"><div className="pf-label"><span className="pf-dot pd-i">I</span>Intervention</div><input className="pf-inp" placeholder="e.g. hormone replacement therapy" value={pico.i} onChange={e=>setPico(v=>({...v,i:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&runSearch()} /></div>
              <div className="pf"><div className="pf-label"><span className="pf-dot pd-c">C</span>Comparison <span style={{fontWeight:400,fontSize:10,color:"var(--t3)"}}>optional</span></div><input className="pf-inp" placeholder="e.g. placebo" value={pico.c} onChange={e=>setPico(v=>({...v,c:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&runSearch()} /></div>
              <div className="pf"><div className="pf-label"><span className="pf-dot pd-o">O</span>Outcome</div><input className="pf-inp" placeholder="e.g. cardiovascular events" value={pico.o} onChange={e=>setPico(v=>({...v,o:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&runSearch()} /></div>
              {picoQ(pico.p,pico.i,pico.c,pico.o) && <div className="pico-preview" style={{gridColumn:"1/-1"}}>{picoQ(pico.p,pico.i,pico.c,pico.o)}</div>}
            </div>
          )}

          {eqUsed && eqUsed!==kw && <div className="eq-banner"><b>Smart query:</b> {eqUsed}</div>}
        </div>
      </div>

      {/* Main */}
      <main className="main">

        {!searched && (
          <div className="empty">
            <div className="empty-ico">📚</div>
            <div className="empty-title">Find the evidence</div>
            <div className="empty-desc">Search 6 free databases simultaneously. Click ⚙ to set your API key and institutional proxy — then every result, including paywalled papers, opens directly.</div>
            <div className="db-chips">{["PubMed","Europe PMC","Semantic Scholar","OpenAlex","CrossRef","DOAJ"].map(d=><span key={d} className="db-chip">{d}</span>)}</div>
            <div className="ex-chips" style={{marginTop:12}}>{EXAMPLES.map(q=><button key={q} className="ex-chip" onClick={()=>{setKw(q);setMode("free");setTimeout(()=>runSearch(q),0);}}>{q}</button>)}</div>
          </div>
        )}

        {searched && (<>
          {/* Source tabs */}
          <div className="tabs">
            {TABS.map(t=><button key={t.key} className={`tab ${activeSrc===t.key?"active":""}`} onClick={()=>setActiveSrc(t.key)}>{t.label}<span className="tab-n">{loading[t.key]?"…":t.count}</span></button>)}
          </div>

          {/* Paywall strip */}
          <div className="pw-strip">
            <div className="pw-strip-hd">Paywall databases — same query, one click{proxy?" · routed via institutional proxy":""}</div>
            <div className="pw-dbs">
              {PAYWALL_DBS.map(db=>{
                const url=db.getUrl(eq||kw);
                return <a key={db.name} className="pw-btn" href={proxy?proxify(url):url} target="_blank" rel="noreferrer" style={{borderColor:db.color,color:db.color,background:db.bg}}>{db.name} ↗</a>;
              })}
            </div>
            {!proxy && <div className="pw-note">Add your EZproxy URL in ⚙ Settings to open these through institutional access</div>}
          </div>

          {/* Errors */}
          {Object.entries(errors).map(([k,m])=><div key={k} className="err-row">⚠ {SRC_META[k]?.label}: {m}</div>)}

          {/* AI panel */}
          {(aiLoad||(aiSum&&!aiOff)) && (
            <div className="ai-panel">
              <div className="ai-hd">
                <div className="ai-badge"><div className="ai-dot"/>AI Synthesis</div>
                {aiSum && <EvBadge level={aiSum.evidence_level}/>}
                {aiSum && <button className="ai-dismiss" onClick={()=>setAiOff(true)}>✕</button>}
              </div>
              {aiLoad&&!aiSum && <div className="ai-loading"><div className="mspin"/>Analysing {allR.length} papers…</div>}
              {aiSum && (<>
                {aiSum.overview && <div className="ai-overview">{aiSum.overview}</div>}
                {aiSum.study_types?.length>0 && <div style={{marginBottom:12}}><div className="ai-slbl">Study types</div><div className="ai-types">{aiSum.study_types.map((t,i)=><span key={i} className="ai-chip">{t}</span>)}</div></div>}
                {aiSum.themes?.length>0 && <div style={{marginBottom:12}}><div className="ai-slbl">Key themes</div><div className="ai-tags">{aiSum.themes.map((t,i)=><span key={i} className="ai-tag">📌 {t}</span>)}</div></div>}
                {aiSum.clinical_implications && <div className="ai-box ai-box-green"><div className="ai-box-lbl">Clinical implications</div><div className="ai-box-txt">{aiSum.clinical_implications}</div></div>}
                {aiSum.gaps && <div className="ai-box ai-box-teal"><div className="ai-box-lbl">Research gaps</div><div className="ai-box-txt">{aiSum.gaps}</div></div>}
                {aiSum.suggested_terms?.length>0 && <div><div className="ai-slbl">Try next</div><div className="ai-sug-wrap">{aiSum.suggested_terms.map((t,i)=><button key={i} className="ai-sug" onClick={()=>runSearch(t)}>{t}</button>)}</div></div>}
              </>)}
            </div>
          )}

          {!apiKey&&!aiLoad&&!aiSum&&allR.length>0 && (
            <div className="ai-panel">
              <div className="ai-hd"><div className="ai-badge">✦ AI Synthesis</div></div>
              <div className="ai-nokey">Add your Anthropic API key in <button style={{background:"none",border:"none",cursor:"pointer",color:"var(--teal)",fontWeight:700,fontFamily:"var(--ff)",fontSize:13}} onClick={()=>setShowModal(true)}>⚙ Settings</button> to get an evidence overview, themes, and research gaps.</div>
            </div>
          )}

          {/* Loading */}
          {isLoading&&sorted.length===0 && <div className="ld-list">{TABS.slice(1).map(t=><div key={t.key} className="ld-row">{loading[t.key]?<div className="mspin"/>:<div className="ld-done">✓</div>}{t.label}{!loading[t.key]&&<span style={{marginLeft:"auto",fontSize:12,color:"var(--t3)"}}>{t.count}</span>}</div>)}</div>}

          {/* Filters */}
          <div className="filters-row">
            <button className={`filt-btn ${showFilt?"on":""}`} onClick={()=>setShowFilt(v=>!v)}>Filters{filtCount>0?` (${filtCount})`:""}</button>
            {bookmarks.size>0 && <button className={`filt-btn ${showBk?"on":""}`} onClick={()=>setShowBk(v=>!v)}>🔖 Bookmarks ({bookmarks.size})</button>}
            {(yrFrom||yrTo||oaOnly) && <button className="filt-btn" onClick={()=>{setYrFrom("");setYrTo("");setOaOnly(false);}}>Clear filters</button>}
          </div>

          {showFilt && (
            <div className="filt-panel">
              <div className="fg"><div className="fg-lbl">Year</div><div className="yr-row"><input className="yr-inp" type="number" placeholder="From" value={yrFrom} onChange={e=>setYrFrom(e.target.value)}/><span style={{color:"var(--t3)"}}>—</span><input className="yr-inp" type="number" placeholder="To" value={yrTo} onChange={e=>setYrTo(e.target.value)}/></div></div>
              <div className="fg"><div className="fg-lbl">Access</div><label className="chk"><input type="checkbox" checked={oaOnly} onChange={e=>setOaOnly(e.target.checked)}/> Open access only</label></div>
              <div className="fg"><div className="fg-lbl">Unpaywall</div><label className="chk"><input type="checkbox" checked={autoBatch} onChange={e=>setAutoBatch(e.target.checked)}/> Auto-check all results</label></div>
            </div>
          )}

          {/* Toolbar */}
          {sorted.length>0 && (
            <div className="toolbar">
              <span className="res-count">{sorted.length} results · {activeSrc!=="all"?SRC_META[activeSrc]?.label:"all sources"}{(oaOnly||yrFrom||yrTo)?" · filtered":""}</span>
              <div className="tbr">
                <select className="sortsel" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
                  <option value="smart">Smart relevance</option>
                  <option value="year">Newest first</option>
                  <option value="relevance">API order</option>
                </select>
                <div className="expwrap" ref={expRef}>
                  <button className="expbtn" onClick={()=>setShowExp(v=>!v)}>Export ▾</button>
                  {showExp && <div className="expmenu">
                    <button className="expitem" onClick={()=>doExport("text")}>Copy plain text</button>
                    <button className="expitem" onClick={()=>doExport("bib")}>Download BibTeX</button>
                    <button className="expitem" onClick={()=>doExport("ris")}>Download RIS</button>
                    <button className="expitem" onClick={()=>doExport("csv")}>Download CSV</button>
                  </div>}
                </div>
              </div>
            </div>
          )}

          {/* Results */}
          {sorted.map((r,i)=>{
            const oa=oaStatus[r.id],freePdf=r.pdfUrl||oa?.pdfUrl,hasFree=r.isOA||r.pdfUrl||oa?.isOA;
            const isExp=expanded.has(r.id),needs=r.abstract&&r.abstract.length>280;
            const dispAbs=isExp||!needs?r.abstract:truncD(r.abstract);
            const viewLink=proxy&&(r.doi||r.link)?proxify(r.doi||r.link):(r.doi||r.link);
            return (
              <div className="rcard" key={r.id} style={{animationDelay:`${Math.min(i,10)*.03}s`}}>
                <div className="card-top">
                  <div className="ctitle">{viewLink?<a href={viewLink} target="_blank" rel="noreferrer">{r.title}</a>:r.title}</div>
                  <div className="cbadges">
                    <span className={`srcbadge ${SRC_META[r.source]?.badge}`}>{SRC_META[r.source]?.label}</span>
                    <SBadge type={r.studyType}/>
                  </div>
                </div>
                <div className="cmeta">
                  {r.year&&<span className="myr">{r.year}</span>}
                  {r.journal&&<><span className="msep">·</span><span className="mjnl">{r.journal}</span></>}
                  {r.authors&&<><span className="msep">·</span><span style={{color:"var(--t3)"}}>{r.authors}</span></>}
                  {r.citationCount>0&&<><span className="msep">·</span><span className="mcite">📎 {r.citationCount}</span></>}
                </div>
                {dispAbs && <div className="cabstract">{dispAbs}</div>}
                {!dispAbs && <div className="cabstract" style={{color:"var(--t3)",fontStyle:"italic"}}>No abstract available.</div>}
                {needs && <button className="abs-more" onClick={()=>setExpanded(s=>{const n=new Set(s);n.has(r.id)?n.delete(r.id):n.add(r.id);return n;})}>{isExp?"Show less":"Show full abstract"}</button>}
                <div className="cfooter">
                  {viewLink&&<a className="lbtn lb-pri" href={viewLink} target="_blank" rel="noreferrer">View paper ↗</a>}
                  {freePdf&&<a className="lbtn lb-grn" href={freePdf} target="_blank" rel="noreferrer">Free PDF ↓</a>}
                  {!freePdf&&r.doi&&!oa&&<button className="lbtn lb-amb" onClick={()=>checkOA(r.doi,r.id)} disabled={oa?.checking}>{oa?.checking?"Checking…":"Find free version"}</button>}
                  {oa&&!oa.isOA&&!oa.checking&&<span className="lbtn lb-gray">No free version</span>}
                  {hasFree&&<span className="oa-flag">Open Access</span>}
                  {proxy&&!hasFree&&<span className="proxy-flag">Via proxy</span>}
                  <button className={`bkbtn ${bookmarks.has(r.id)?"saved":""}`} onClick={()=>setBookmarks(s=>{const n=new Set(s);n.has(r.id)?n.delete(r.id):n.add(r.id);return n;})} title="Bookmark">{bookmarks.has(r.id)?"🔖":"🏷"}</button>
                </div>
              </div>
            );
          })}

          {searched&&!isLoading&&sorted.length===0&&allR.length>0&&(
            <div style={{textAlign:"center",padding:"32px",color:"var(--t3)",fontSize:14}}>
              No results match these filters. <button style={{color:"var(--teal)",background:"none",border:"none",cursor:"pointer",fontFamily:"var(--ff)",fontWeight:600}} onClick={()=>{setYrFrom("");setYrTo("");setOaOnly(false);setShowBk(false);}}>Clear</button>
            </div>
          )}
        </>)}

        {/* Legal access */}
        <div className="section">
          <div className="sec-title">Legal routes to paywalled papers</div>
          <div className="sec-desc">When the institutional proxy doesn't cover a specific paper, these usually will.</div>
          <div className="wk-grid">
            {WORKAROUNDS.map(w=>(
              <div className="wk-card" key={w.name}>
                <div className="wk-top"><span className="wk-ico">{w.icon}</span><span className="wk-name">{w.name}</span><span className={`wk-type t-${w.type}`}>{w.type==="free"?"Free":w.type==="legal"?"Legal OA":"Tip"}</span></div>
                <div className="wk-desc">{w.desc}</div>
                <a className="wk-link" href={w.url} target="_blank" rel="noreferrer">{w.ul} ↗</a>
              </div>
            ))}
          </div>
        </div>
      </main>

      <div className="footer">MedLit Search · PubMed · Europe PMC · Semantic Scholar · OpenAlex · CrossRef · DOAJ</div>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
